base-config:
  company: DeepSeek
  documentation_url: https://api-docs.deepseek.com/
  open_source: true
  supports:
    images: false
    files: false
  properties:
    reasoning_model: false

core-models:
  base-config:
    supports:
      tools: true
      batch: false
      temperature: true
    default_parameters:
      temperature: 1

  deepseek/deepseek-chat:
    label: DeepSeek Chat
    release_date: 2025-09-29
    properties:
      context_window: 128_000
      max_tokens: 8_000
    costs_per_million_token:
      input: 0.28
      output: 0.42
      cache:
        read: 0.028

  deepseek/deepseek-reasoner:
    label: DeepSeek Reasoner
    release_date: 2025-09-29
    supports:
      temperature: false
    properties:
      context_window: 128_000
      max_tokens: 64_000
      reasoning_model: true
    costs_per_million_token:
      input: 0.28
      output: 0.42
      cache:
        read: 0.028
