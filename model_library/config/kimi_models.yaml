base-config:
  company: Moonshot AI
  documentation_url: https://platform.moonshot.ai/docs
  open_source: true
  supports:
    images: false
    tools: true
    files: false

kimi-models:

  kimi/kimi-k2.7-code:
    label: Kimi K2.7 Code
    release_date: 2026-06-12
    documentation_url: https://platform.kimi.ai/docs/guide/kimi-k2-7-code-quickstart
    supports:
      images: true
      videos: true
      temperature: false
    properties:
      reasoning_model: true
      context_window: 262_144
      max_tokens: 256_000
    default_parameters:
      max_tokens: 32_768
      temperature: 1.0
      top_p: 0.95
    costs_per_million_token:
      input: 0.95
      output: 4.0
      cache:
        read: 0.19

  kimi/kimi-k2.6:
    label: Kimi K2.6
    release_date: 2026-04-20
    supports:
      images: true
      temperature: false
    properties:
      reasoning_model: false
      context_window: 262_144
      max_tokens: 256_000
    default_parameters:
      temperature: 0.6
      top_p: 0.95
      max_tokens: 128_000
    costs_per_million_token:
      input: 0.95
      output: 4.0
      cache:
        read: 0.16
    alternative_keys:
      - kimi/kimi-k2.6-thinking:
          properties:
            reasoning_model: true
          default_parameters:
            temperature: 1.0

  kimi/kimi-k2.5:
    label: Kimi K2.5
    release_date: 2026-01-26
    supports:
      images: true
      temperature: false
    properties:
      reasoning_model: false
      context_window: 262_144
      max_tokens: 128_000
    default_parameters:
      temperature: 0.6
      top_p: 0.95
    costs_per_million_token:
      input: 0.6
      output: 3.0
      cache:
        read: 0.1
    alternative_keys:
      - kimi/kimi-k2.5-thinking:
          properties:
            reasoning_model: true
          default_parameters:
            temperature: 1.0
