base-config:
  company: Anthropic
  open_source: false
  supports:
    images: true
    files: true
    tools: true
    temperature: true
    output_schema: true
  metadata:
    available_for_everyone: true
    available_as_evaluator: false
    ignored_for_cost: false
  properties:
    reasoning_model: false
  costs_per_million_token:
    cache:
      read_discount: 0.1
      write_markup: 1.25
    batch:
      input_discount: 0.5
      output_discount: 0.5
  documentation_url: https://docs.claude.com/en/docs/about-claude/models/overview
  default_parameters:
    temperature: 1


claude-4-models:
  base-config:
    supports:
      batch: true

    
  anthropic/claude-sonnet-4-6:
    label: Claude Sonnet 4.6
    release_date: 2026-02-17
    properties:
      context_window: 200_000
      max_tokens: 128_000
      reasoning_model: true
    costs_per_million_token:
      input: 3
      output: 15
      cache:
        read: 0.3
        write: 3.75
    provider_properties:
      supports_auto_thinking: true
      supports_compute_effort: true
    default_parameters:
      temperature: 1
      compute_effort: "max"
    metadata:
      available_as_evaluator: true


