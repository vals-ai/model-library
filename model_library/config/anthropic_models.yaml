base-config:
  company: Anthropic
  open_source: false
  supports:
    images: true
    files: true
    tools: true
    temperature: true
    output_schema: true
  properties:
    reasoning_model: false
  costs_per_million_token:
    cache:
      read_discount: 0.1
      write_markup: 1.25
    batch:
      input_discount: 0.5
      output_discount: 0.5
  documentation_url: https://docs.claude.com/en/docs/about-claude/models/overview
  default_parameters:
    temperature: 1
claude-opus-4-7-models:

  anthropic/claude-opus-4-7:
    label: Claude Opus 4.7
    release_date: 2026-04-16
    properties:
      context_window: 1_000_000
      max_tokens: 128_000
      reasoning_model: true
    costs_per_million_token:
      input: 5.0
      output: 25.0
      cache:
        read: 0.5
        write: 6.25
    provider_properties:
      supports_auto_thinking: true
      supports_compute_effort: true
    default_parameters:
      compute_effort: "max"
    alternative_keys:
      - anthropic/claude-opus-4-7-high:
          label: Claude Opus 4.7 (High Effort)
          default_parameters:
            compute_effort: "high"


