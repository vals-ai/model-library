base-config:
  company: Perplexity
  documentation_url: https://docs.perplexity.ai
  open_source: false
  supports:
    images: false
    files: false
    batch: false
    temperature: true
    tools: false
  properties:
    context_window: 128000
    max_tokens: 0
    training_cutoff: null
    reasoning_model: false

sonar-models:

  perplexity/sonar:
    label: Sonar
    documentation_url: https://docs.perplexity.ai/models/models/sonar
    costs_per_million_token:
      input: 1.0
      output: 1.0

  perplexity/sonar-pro:
    label: Sonar Pro
    documentation_url: https://docs.perplexity.ai/models/models/sonar-pro
    properties:
      context_window: 200000
    costs_per_million_token:
      input: 3.0
      output: 15.0

  perplexity/sonar-reasoning-pro:
    label: Sonar Reasoning Pro
    documentation_url: https://docs.perplexity.ai/models/models/sonar-reasoning-pro
    properties:
      reasoning_model: true
    costs_per_million_token:
      input: 2.0
      output: 8.0

  perplexity/sonar-deep-research:
    label: Sonar Deep Research
    documentation_url: https://docs.perplexity.ai/models/models/sonar-deep-research
    properties:
      reasoning_model: true
    costs_per_million_token:
      input: 2.0
      output: 8.0
