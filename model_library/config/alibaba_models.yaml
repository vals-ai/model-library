base-config:
  company: Alibaba
  open_source: false
  supports:
    temperature: true
  metadata:
    available_for_everyone: false
  default_parameters:
    temperature: 0.7
  properties:
    reasoning_model: false

qwen-3-max-models:
  base-config:
    supports:
      tools: true
      images: false
    # only applies for <32K input tokens
    # TODO: add thresholds
    costs_per_million_token:
      input: 1.2
      output: 6.0

  alibaba/qwen3-max-2026-01-23:
    label: Qwen 3 Max Thinking
    release_date: 2026-01-23
    properties:
      context_window: 256_000
      max_tokens: 32_000
      reasoning_model: true

  alibaba/qwen3-max-preview:
    label: Qwen 3 Max Preview
    release_date: 2025-09-05
    properties:
      context_window: 262_144
      max_tokens: 65_536
      reasoning_model: true

  alibaba/qwen3-max-2025-09-23:
    label: Qwen 3 Max 2025-09-23
    release_date: 2025-09-23
    properties:
      context_window: 262_144
      max_tokens: 65_536
      training_cutoff: ""
      reasoning_model: true

  alibaba/qwen3-max:
    label: Qwen 3 Max
    release_date: 2025-09-23
    metadata:
      available_for_everyone: true
    properties:
      context_window: 262_144
      max_tokens: 65_536
      training_cutoff: ""

qwen-3.5-models:
  base-config:
    supports:
      images: true
      videos: true
      tools: true

  alibaba/qwen3.5-plus:
    label: Qwen 3.5 Plus
    open_source: true
    documentation_url: https://www.alibabacloud.com/help/en/model-studio/getting-started/models
    release_date: 2026-02-16
    metadata:
      available_for_everyone: true
    properties:
      context_window: 991_000
      max_tokens: 65_536
    costs_per_million_token:
      input: 0.4
      output: 2.4
      cache:
        read: 0.04
        write: 0.5
      context:
        threshold: 256_000
        input: 1.2
        output: 7.2
        cache:
          read: 0.12
          write: 1.5
    alternative_keys:
      - alibaba/qwen3.5-plus-thinking:
          properties:
            reasoning_model: true
          default_parameters:
            temperature: 0.6 # from https://huggingface.co/Qwen/Qwen3.5-397B-A17B

  alibaba/qwen3.5-flash:
    label: Qwen 3.5 Flash
    open_source: true
    documentation_url: https://www.alibabacloud.com/help/en/model-studio/models
    release_date: 2026-02-23
    metadata:
      available_for_everyone: true
    properties:
      context_window: 1_000_000
      max_tokens: 65_536
      reasoning_model: true
    costs_per_million_token:
      input: 0.1
      output: 0.4
      cache:
        read: 0.02
    default_parameters:
      temperature: 1.0

qwen-3.6-models:
  base-config:
    supports:
      images: true
      videos: true
      tools: true

  alibaba/qwen3.6-plus:
    label: Qwen 3.6 Plus
    documentation_url: https://www.alibabacloud.com/help/en/model-studio/models
    release_date: 2026-04-02
    metadata:
      available_for_everyone: true
    properties:
      context_window: 983_616
      max_tokens: 65_536
      reasoning_model: true
    costs_per_million_token:
      input: 0.5
      output: 3
      cache:
        read: 0.05
        write: 0.625
      context:
        threshold: 256_000
        input: 2.0
        output: 6.0

