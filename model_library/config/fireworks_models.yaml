base-config:
  company: Fireworks
  documentation_url: https://fireworks.ai/models
  open_source: false
  supports:
    files: false
    tools: true
  properties:
    reasoning_model: false
  costs_per_million_token:
    cache:
      read_discount: 1
    batch:
      input_discount: 0.5
      output_discount: 0.5

deepseek-models:
  base-config:
    company: DeepSeek
    open_source: true
    supports:
      images: false
      temperature: true
    default_parameters:
      temperature: 1

openai-models:
  base-config:
    company: OpenAI
    open_source: true
    supports:
      images: false

  fireworks/gpt-oss-120b:
    label: GPT OSS 120B
    release_date: 2025-08-05
    properties:
      context_window: 128_000
      max_tokens: 32_768
      training_cutoff: null
      reasoning_model: true
    costs_per_million_token:
      input: 0.15
      output: 0.60

  fireworks/gpt-oss-20b:
    label: GPT OSS 20B
    release_date: 2025-08-05
    properties:
      context_window: 128_000
      max_tokens: 32_768
      training_cutoff: null
      reasoning_model: true
    costs_per_million_token:
      input: 0.07
      output: 0.3

kimi-models:
  base-config:
    company: Moonshot AI
    open_source: true
    documentation_url: https://www.kimi.com/
    supports:
      images: false

zai-models:
  base-config:
    company: zAI
    open_source: true
    documentation_url: https://docs.z.ai/
    supports:
      images: false
      temperature: true

  fireworks/glm-5p2:
    label: GLM 5.2 (Fireworks)
    release_date: 2026-06-13
    properties:
      context_window: 1_000_000
      max_tokens: 131_072
      reasoning_model: true
    costs_per_million_token:
      input: 1.40
      output: 4.40
      cache:
        read: 0.14
    default_parameters:
      temperature: 1
      top_p: 0.95
