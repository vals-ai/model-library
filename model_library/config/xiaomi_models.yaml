base-config:
  company: Xiaomi
  open_source: true
  documentation_url: https://platform.xiaomimimo.com/#/docs/
  supports:
    images: false
    files: false
    tools: true
  properties:
    training_cutoff: December 2024
    reasoning_model: false

mimo-models:
  base-config:
    properties:
      context_window: 256000
    supports:
      temperature: true
    default_parameters:
      temperature: 0.3
      top_p: 0.95

  xiaomi/mimo-v2.5:
    label: MiMo V2.5
    release_date: 2026-04-22
    supports:
      images: true # Only the standard version supports images - pro does not
    properties:
      context_window: 1_000_000
      max_tokens: 128_000
      reasoning_model: true
    default_parameters:
      temperature: 1.0
    costs_per_million_token:
      input: 0.14
      output: 0.28
      cache:
        read: 0.0028

  xiaomi/mimo-v2.5-pro:
    label: MiMo V2.5 Pro
    release_date: 2026-04-22
    properties:
      context_window: 1_000_000
      max_tokens: 128_000
      reasoning_model: true
    default_parameters:
      temperature: 1.0
    costs_per_million_token:
      input: 0.435
      output: 0.87
      cache:
        read: 0.0036

  xiaomi/mimo-v2-flash:
    label: MiMo V2 Flash
    release_date: 2025-12-17
    properties:
      max_tokens: 64000
    costs_per_million_token:
      input: 0.10
      output: 0.30
      cache:
        read: 0.01
