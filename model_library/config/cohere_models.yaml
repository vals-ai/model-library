base-config:
  company: Cohere
  open_source: false
  documentation_url: https://docs.cohere.com/v2/docs/models
  supports:
    images: false
    files: false
    tools: true
  properties:
    reasoning_model: false
    training_cutoff: null

command-models:
  base-config:
    supports:
      temperature: true
    default_parameters:
      temperature: 0.3

  cohere/command-a-03-2025:
    label: Command A
    release_date: 2025-03-13
    properties:
      context_window: 256000
      max_tokens: 8000
    costs_per_million_token:
      input: 2.5
      output: 10.0

  cohere/command-r7b-12-2024:
    label: Command R7B
    release_date: 2024-12-13
    properties:
      context_window: 128000
      max_tokens: 4000
    costs_per_million_token:
      input: 0.0375
      output: 0.15
